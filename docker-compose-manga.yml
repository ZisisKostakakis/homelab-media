# Manga Stack
# Suwayomi - manga downloader (MangaDex + other sources)
# Komf - manga metadata fetcher (pushes to Kavita)

services:
  suwayomi:
    image: ghcr.io/suwayomi/tachidesk:latest
    container_name: suwayomi
    restart: unless-stopped
    ports:
      - "${SUWAYOMI_PORT:-4567}:4567"
    environment:
      - TZ=${TZ}
      - JAVA_TOOL_OPTIONS=-Dfile.encoding=UTF-8
    volumes:
      - /var/lib/homelab-media-configs/suwayomi:/home/suwayomi/.local/share/Tachidesk
      - /mnt/media/books/manga:/downloads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4567/api/v1/settings"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 2m
    networks:
      - media_network

  komf:
    image: sndxr/komf:latest
    container_name: komf
    restart: unless-stopped
    ports:
      - "${KOMF_PORT:-8085}:8085"
    environment:
      - TZ=${TZ}
      - KOMF_KAVITA_BASE_URI=http://kavita:5000
      - KOMF_KAVITA_API_KEY=${KOMF_KAVITA_API_KEY}
      - KOMF_LOG_LEVEL=${KOMF_LOG_LEVEL:-INFO}
    volumes:
      - /var/lib/homelab-media-configs/komf:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 2m
    networks:
      - media_network

networks:
  media_network:
    external: true
    name: homelab_media_network
